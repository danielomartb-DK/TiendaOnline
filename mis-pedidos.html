<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mis Pedidos | PixelWear</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff9900",
                        "background-light": "#f8f7f5",
                        "background-dark": "#231b0f",
                        "brand-blue": "#131921",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mecha": ["Rajdhani", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #231b0f;
            color: #ffffff;
            padding: 15px 20px;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
    <script src="js/theme.js"></script>
</head>

<body
    class="bg-background-light dark:bg-slate-900 text-slate-900 dark:text-gray-100 font-display transition-colors duration-300">
    <!-- Header -->
    <header
        class="sticky top-0 left-0 right-0 z-40 bg-[#0f1013]/95 dark:bg-[#020305]/95 backdrop-blur-md border-b-2 border-cyan-500 shadow-lg text-white h-[74px] flex items-center px-4 md:px-10">
        <div class="max-w-[1440px] w-full mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 shrink-0 group">
                <div
                    class="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-400 to-amber-600 dark:from-cyan-400 dark:to-blue-600 flex items-center justify-center shadow-lg transition-transform group-hover:scale-110">
                    <span class="material-symbols-outlined text-white text-2xl"
                        style="font-variation-settings: 'FILL' 1;">diamond</span>
                </div>
                <div class="flex flex-col justify-center translate-y-[2px]">
                    <span class="text-xl font-black tracking-widest text-white leading-none uppercase">Pixel<span
                            class="text-orange-400 dark:text-cyan-400">Wear</span></span>
                </div>
            </a>
            <div class="flex items-center gap-6">
                <a href="index.html"
                    class="text-sm font-bold hover:text-primary transition-colors flex items-center gap-1">
                    <span class="material-symbols-outlined">storefront</span> Volver a la Tienda
                </a>
                <div class="auth-container-ui"></div>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">
        <div class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-900 dark:text-white mb-2 flex items-center gap-3">
                    <span class="material-symbols-outlined text-4xl text-cyan-500">package</span> Tus Pedidos
                </h1>
                <p class="text-slate-500 dark:text-slate-400">Revisa el historial y estado de tus compras en PixelWear.
                </p>
            </div>
        </div>

        <div
            class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700/50 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr
                            class="bg-slate-50 dark:bg-slate-800/80 text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wider">
                            <th class="p-4 font-bold border-b border-slate-200 dark:border-slate-700/50">Pedido</th>
                            <th class="p-4 font-bold border-b border-slate-200 dark:border-slate-700/50">Fecha</th>
                            <th class="p-4 font-bold border-b border-slate-200 dark:border-slate-700/50">Total</th>
                            <th class="p-4 font-bold border-b border-slate-200 dark:border-slate-700/50">Estado</th>
                            <th class="p-4 font-bold border-b border-slate-200 dark:border-slate-700/50 w-24">Acciones
                            </th>
                        </tr>
                    </thead>
                    <tbody id="listaPedidosUsuario" class="divide-y divide-slate-100 dark:divide-slate-700/50">
                        <tr>
                            <td colspan="5" class="p-12 text-center text-slate-500">
                                <span
                                    class="material-symbols-outlined animate-spin text-4xl mb-4 text-cyan-500">sync</span>
                                <p>Cargando tus pedidos...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Detalles -->
    <dialog id="modalDetallePedido"
        class="bg-transparent m-auto p-4 backdrop:bg-slate-900/80 backdrop:backdrop-blur-sm w-full max-w-lg">
        <div
            class="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col max-h-[85vh]">
            <div
                class="bg-slate-50 dark:bg-slate-900/50 p-6 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center">
                <h3 class="text-xl font-black text-slate-900 dark:text-white" id="modalDetalleTitulo">Detalles del
                    Pedido</h3>
                <button onclick="document.getElementById('modalDetallePedido').close()"
                    class="text-slate-400 hover:text-slate-600 dark:hover:text-white transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-6 overflow-y-auto" id="modalDetalleContenido">
                <!-- Contenido dinámico -->
            </div>
            <div class="p-6 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50"
                id="modalDetalleTotal">
                <!-- Total -->
            </div>
        </div>
    </dialog>

    <div id="toast" class="toast">
        <span class="material-symbols-outlined text-green-500">check_circle</span>
        <span id="toastMessage"></span>
    </div>

    <script src="js/currency.js"></script>
    <script src="js/api.js?v=12"></script>
    <script src="js/auth.js?v=12"></script>
    <script src="js/pedidos.js?v=1"></script>
</body>

</html>
