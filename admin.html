<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PixelWear | Panel de Administración</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff9900",
                        "background-light": "#f8f7f5",
                        "background-dark": "#231b0f",
                        "brand-blue": "#131921",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-left-color: #ff9900;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #231b0f;
            color: #ffffff;
            padding: 15px 20px;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
    <!-- Script de Persistencia de Tema Oscuro/Claro (Debe ir antes de cerrar head) -->
    <script src="js/theme.js"></script>
</head>

<body
    class="bg-background-light dark:bg-slate-900 text-slate-900 dark:text-gray-100 font-display min-h-screen flex flex-col transition-colors duration-300">

    <!-- Barra de NavegaciÃ³n -->
    <header
        class="fixed top-0 left-0 right-0 z-50 bg-brand-blue text-white shadow-md h-16 flex items-center px-4 md:px-10">
        <div class="max-w-[1440px] w-full mx-auto flex items-center justify-between gap-4">
            <a href="index.html" class="flex items-center gap-2 shrink-0 group">
                <div
                    class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-[0_0_15px_rgba(0,183,255,0.4)] transition-transform duration-300 group-hover:scale-110">
                    <span class="material-symbols-outlined text-white text-2xl"
                        style="font-variation-settings: 'FILL' 1;">diamond</span>
                </div>
                <div class="flex flex-col justify-center translate-y-[2px]">
                    <span class="text-lg font-black tracking-widest text-white leading-none">PIXEL<span
                            class="text-cyan-400">WEAR</span></span>
                    <span class="text-[0.55rem] font-bold text-primary ml-1 uppercase tracking-widest mt-1">Admin</span>
                </div>
            </a>
            <!-- Controles de Usuario y Tema -->
            <div class="flex items-center gap-4 shrink-0">
                <a href="index.html" class="text-sm font-bold hover:underline flex items-center gap-1 text-primary">
                    <span class="material-symbols-outlined">storefront</span> Volver a la Tienda
                </a>

                <!-- Theme Anime Avatar Button (Big Slider) -->
                <button onclick="toggleTheme()"
                    class="relative w-20 h-8 md:w-24 md:h-10 bg-slate-300 dark:bg-slate-800 rounded-full shadow-inner border border-slate-400 dark:border-slate-600 transition-colors duration-300 mx-2 flex items-center group shrink-0"
                    title="Cambiar Tema (Anime)">

                    <!-- Track de Efectos Visuales -->
                    <div class="absolute inset-0 rounded-full overflow-hidden pointer-events-none">
                        <!-- Efecto oscuro Jin-Woo -->
                        <div
                            class="absolute inset-0 bg-gradient-to-l from-blue-600/40 via-indigo-900/10 to-transparent opacity-100 dark:opacity-0 transition-opacity duration-500 shadow-[inset_-15px_0_20px_rgba(79,70,229,0.5)]">
                        </div>
                        <!-- Efecto llameante Rengoku -->
                        <div
                            class="absolute inset-0 bg-gradient-to-r from-orange-500/50 via-red-500/10 to-transparent opacity-0 dark:opacity-100 transition-opacity duration-500 shadow-[inset_15px_0_20px_rgba(249,115,22,0.5)]">
                        </div>
                    </div>

                    <div class="absolute inset-x-0 flex justify-between px-2.5 text-xl pointer-events-none z-10">
                        <span class="opacity-100 drop-shadow-md">🌞</span>
                        <span class="opacity-100 drop-shadow-[0_0_8px_rgba(255,255,255,0.8)]">🌙</span>
                    </div>
                    <span
                        class="theme-icon-toggle absolute -left-2 top-1/2 -translate-y-1/2 transition-all duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)] transform dark:translate-x-10 md:dark:translate-x-12 z-10 w-14 h-14 md:w-16 md:h-16 flex items-center justify-center"></span>
                </button>

                <!-- Cuenta -->
                <div class="auth-container-ui hidden lg:flex">
                    <!-- Se llena por auth.js -->
                </div>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-12 flex-1 relative">
        <div class="max-w-[800px] mx-auto px-4">
            <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-8">
                <h2 class="text-3xl font-black mb-2 flex items-center gap-3">
                    <span class="material-symbols-outlined text-primary text-4xl">inventory_2</span>
                    Agregar Nuevo Producto
                </h2>
                <p class="text-slate-500 mb-8 pb-6 border-b border-slate-100">Carga un nuevo artículo al catálogo de
                    PixelWear. Las imágenes se subirán automáticamente a Supabase Storage.</p>

                <form id="adminProductForm" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Nombre del Producto -->
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-slate-700 mb-2">Nombre del Producto</label>
                            <input type="text" id="prodNombre" required
                                class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary focus:border-primary transition-all"
                                placeholder="Ej. Laptop Gaming Asus ROG Strix" />
                        </div>

                        <!-- Precio -->
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Precio ($)</label>
                            <input type="number" step="0.01" min="0" id="prodPrecio" required
                                class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary focus:border-primary transition-all"
                                placeholder="0.00" />
                        </div>

                        <!-- Stock -->
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Stock Inicial (Unidades)</label>
                            <input type="number" min="0" id="prodStock" required
                                class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary focus:border-primary transition-all"
                                placeholder="10" />
                        </div>

                        <!-- Descripción -->
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-slate-700 mb-2">Descripción General
                                (Opcional)</label>
                            <textarea id="prodDesc" rows="3"
                                class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-primary focus:border-primary transition-all"
                                placeholder="Añade detalles del producto..."></textarea>
                        </div>

                        <!-- Imagen -->
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-slate-700 mb-2">Fotografía del Producto</label>
                            <div class="flex items-center justify-center w-full">
                                <label for="prodImagen"
                                    class="flex flex-col items-center justify-center w-full h-48 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition-colors">
                                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                        <span
                                            class="material-symbols-outlined text-5xl text-slate-400 mb-3 block">cloud_upload</span>
                                        <p class="mb-2 text-sm text-slate-500"><span class="font-bold">Haz clic para
                                                subir</span> o arrastra y suelta</p>
                                        <p class="text-xs text-slate-400">PNG, JPG o WEBP (MAX. 5MB)</p>
                                        <p id="fileNameDisplay"
                                            class="mt-3 text-sm font-bold text-primary text-center px-4 truncate w-full max-w-xs">
                                        </p>
                                    </div>
                                    <input id="prodImagen" type="file" class="hidden"
                                        accept="image/png, image/jpeg, image/webp" required />
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Mensaje de Error Carga -->
                    <div id="adminErrorMsg"
                        class="hidden bg-red-50 text-red-600 p-4 rounded-lg border border-red-200 text-sm font-medium flex items-center gap-2">
                        <span class="material-symbols-outlined">error</span>
                        <span id="adminErrorText">Error al subir el producto.</span>
                    </div>

                    <button type="submit" id="btnSubmitProducto"
                        class="w-full bg-primary text-brand-blue font-bold py-4 rounded-xl text-lg hover:brightness-110 shadow-lg shadow-primary/30 transition-all flex justify-center items-center gap-3">
                        <span class="material-symbols-outlined">add_circle</span>
                        Guardar Producto en el Catálogo
                    </button>
                </form>
            </div>
        </div>
    </main>

    <!-- Notificación Toast -->
    <div id="toast" class="toast">
        <span class="material-symbols-outlined" style="color: #4caf50;">check_circle</span>
        <span id="toastMessage">¡Producto creado con éxito!</span>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js?v=5"></script>
    <script src="js/admin.js?v=3"></script>
    <script src="js/magnetic.js"></script>
</body>

</html>
