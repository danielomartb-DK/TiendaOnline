<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mi Perfil | PixelWear</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff9900",
                        "background-light": "#f8f7f5",
                        "background-dark": "#231b0f",
                        "brand-blue": "#131921",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mecha": ["Rajdhani", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #231b0f;
            color: #ffffff;
            padding: 15px 20px;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
    <script src="js/theme.js"></script>
</head>

<body
    class="bg-background-light dark:bg-slate-900 text-slate-900 dark:text-gray-100 font-display transition-colors duration-300">
    <!-- Header -->
    <header
        class="sticky top-0 left-0 right-0 z-40 bg-[#0f1013]/95 dark:bg-[#020305]/95 backdrop-blur-md border-b-2 border-cyan-500 shadow-lg text-white h-[74px] flex items-center px-4 md:px-10">
        <div class="max-w-[1440px] w-full mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 shrink-0 group">
                <div
                    class="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-400 to-amber-600 dark:from-cyan-400 dark:to-blue-600 flex items-center justify-center shadow-lg transition-transform group-hover:scale-110">
                    <span class="material-symbols-outlined text-white text-2xl"
                        style="font-variation-settings: 'FILL' 1;">diamond</span>
                </div>
                <div class="flex flex-col justify-center translate-y-[2px]">
                    <span class="text-xl font-black tracking-widest text-white leading-none uppercase">Pixel<span
                            class="text-orange-400 dark:text-cyan-400">Wear</span></span>
                </div>
            </a>
            <div class="flex items-center gap-6">
                <a href="index.html"
                    class="text-sm font-bold hover:text-primary transition-colors flex items-center gap-1">
                    <span class="material-symbols-outlined">storefront</span> Volver a la Tienda
                </a>
                <div class="auth-container-ui"></div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <div
            class="bg-white dark:bg-slate-800 rounded-3xl shadow-xl overflow-hidden border border-slate-200 dark:border-slate-700">
            <div class="h-32 bg-gradient-to-r from-orange-500 to-red-600 dark:from-cyan-600 dark:to-blue-800 relative">
                <div
                    class="absolute -bottom-12 left-12 w-24 h-24 rounded-full bg-white dark:bg-slate-700 p-1 shadow-lg border-4 border-white dark:border-slate-800 overflow-hidden">
                    <img id="profileAvatar" src="https://ui-avatars.com/api/?name=User&background=random" alt="Avatar"
                        class="w-full h-full object-cover rounded-full">
                </div>
            </div>

            <div class="pt-16 pb-8 px-12">
                <h1 class="text-3xl font-black text-slate-900 dark:text-white mb-2">Mi Perfil</h1>
                <p class="text-slate-500 dark:text-slate-400 mb-8">Gestiona tus datos personales para una experiencia de
                    compra más rápida.</p>

                <form id="profileForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label
                            class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Nombres</label>
                        <input type="text" name="nombres" required
                            class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-primary outline-none transition-all">
                    </div>

                    <div>
                        <label
                            class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Apellidos</label>
                        <input type="text" name="apellidos" required
                            class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-primary outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Documento
                            de Identidad</label>
                        <input type="text" name="documento" required
                            class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-primary outline-none transition-all">
                    </div>

                    <div>
                        <label
                            class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Teléfono</label>
                        <input type="text" name="telefono"
                            class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-primary outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Correo
                            Electrónico</label>
                        <input type="email" name="email" readonly
                            class="w-full bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-slate-500 cursor-not-allowed">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Dirección
                            de Envío</label>
                        <input type="text" name="direccion"
                            class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-primary outline-none transition-all">
                    </div>

                    <div>
                        <label
                            class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Ciudad</label>
                        <input type="text" name="ciudad"
                            class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-primary outline-none transition-all">
                    </div>

                    <div>
                        <label
                            class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">País</label>
                        <input type="text" name="pais"
                            class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-primary outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Código
                            Postal</label>
                        <input type="text" name="codigo_postal"
                            class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-primary outline-none transition-all">
                    </div>

                    <div class="md:col-span-2 mt-4">
                        <button type="submit" id="btnSaveProfile"
                            class="w-full md:w-max px-12 py-4 bg-gradient-to-r from-orange-500 to-red-600 dark:from-cyan-500 dark:to-blue-600 text-white font-bold rounded-xl shadow-lg hover:brightness-110 transition-all flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined">save</span>
                            Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="toast" class="toast">
        <span class="material-symbols-outlined text-green-500">check_circle</span>
        <span id="toastMessage"></span>
    </div>

    <script src="js/api.js?v=11"></script>
    <script src="js/auth.js?v=11"></script>
    <script src="js/currency.js"></script>
    <script src="js/perfil.js?v=1"></script>
</body>

</html>
